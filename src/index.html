<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>搜索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 背景：纯黑底 + 图片层（淡入） -->
  <div id="bg">
    <div id="bg-img"></div>
    <div id="bg-next"></div>
  </div>
  <div id="overlay"></div>

  <!-- 主舞台 -->
  <div id="stage">
    <div id="clock">00:00</div>
    <div id="date-label">--</div>

    <div id="search-wrap">

      <!-- 引擎下拉菜单（绝对定位，独立于 search-box） -->
      <div id="engine-dropdown">
        <button class="dd-item" data-engine="google">
          Google
          <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
        <button class="dd-item" data-engine="bing">
          Bing
          <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </div>

      <!-- 搜索框本体 -->
      <div id="search-box">

        <!-- 左侧引擎切换按钮（聚焦时淡出） -->
        <button id="engine-toggle" type="button">
          <span id="engine-label">Google</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

        <!-- 搜索图标（聚焦时淡入，替代引擎按钮） -->
        <div id="search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>

        <!-- 输入框 -->
        <input id="search-input" type="text" placeholder="搜索…"
               autocomplete="off" spellcheck="false" />
      </div>

      <!-- 搜索候选列表 -->
      <div id="suggestions"></div>

    </div>
  </div>

  <!-- 图源标注 -->
  <a id="img-credit" href="https://uapis.cn" target="_blank" rel="noopener">ACG · uapis.cn</a>

  <!-- 壁纸控制 -->
  <div id="wallpaper-controls">
    <button id="prev-bg" class="wallpaper-btn wallpaper-side" type="button" title="上一张">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </button>
    <button id="download-bg" class="wallpaper-btn wallpaper-side" type="button" title="下载壁纸">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
