# ═══════════════════════════════════════════════
# Yuki Search Nginx 配置
# 文件位置：/etc/nginx/sites-available/yuki-search
# 启用方式：ln -s /etc/nginx/sites-available/yuki-search /etc/nginx/sites-enabled/
# 说明：服务器只负责静态文件分发，不提供候选、壁纸或搜索代理服务。
# ═══════════════════════════════════════════════

server {
    listen 80;
    server_name search4.yukicloud.top;         

    root /var/www/yuki-search/src;
    index index.html;

    # ── 静态文件 ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip 压缩 ────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1024;
}
