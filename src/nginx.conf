# ═══════════════════════════════════════════════
# Homepage Nginx 配置
# 文件位置：/etc/nginx/sites-available/homepage
# 启用方式：ln -s /etc/nginx/sites-available/homepage /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════

server {
    listen 80;
    server_name search.yukicloud.top;         

    root /var/www/homepage;
    index index.html;

    # ── 静态文件 ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 搜索候选代理 ─────────────────────────────
    # 前端请求 /suggest?engine=google&q=关键词
    # Nginx 在服务端转发，解决浏览器 CORS 限制
    location /suggest {
        set $upstream "";

        if ($arg_engine = "google") {
            set $upstream "https://suggestqueries.google.com/complete/search?client=firefox&q=$arg_q";
        }
        if ($arg_engine = "bing") {
            set $upstream "https://api.bing.com/osjson.aspx?query=$arg_q";
        }

        # engine 参数无效时返回空数组
        if ($upstream = "") {
            return 200 '[]';
        }

        # 同域请求其实不需要 CORS 头，但加上不影响
        add_header Content-Type "application/json; charset=utf-8" always;
        add_header Access-Control-Allow-Origin "*" always;

        # 转发给上游
        proxy_pass $upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header Referer "";
        proxy_set_header User-Agent "Mozilla/5.0";

        # 5 秒上游超时
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ── Gzip 压缩 ────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;
}
